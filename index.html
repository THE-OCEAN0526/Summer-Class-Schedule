<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>李有炫 暑假工讀班表行事曆</title>
    <style>
        body {
            font-family: 'Helvetica Neue', Helvetica, Arial, 'Microsoft JhengHei', sans-serif;
            background-color: #f0f2f5;
            color: #333;
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
        }
        .calendar-container {
            width: 100%;
            max-width: 800px;
            background: #fff;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.08);
        }
        h1 {
            text-align: center;
            color: #2c3e50;
            margin-top: 0;
            margin-bottom: 10px;
            font-size: 26px;
        }
        .summary-box {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background-color: #f8f9fa;
            padding: 15px 20px;
            border-radius: 8px;
            margin-bottom: 25px;
            border-left: 5px solid #3498db;
        }
        .summary-item {
            font-size: 16px;
            font-weight: bold;
        }
        .total-hours {
            color: #e74c3c;
        }
        .month-hours {
            color: #e67e22;
        }
        /* 行事曆控制區 */
        .calendar-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }
        .calendar-header button {
            background-color: #3498db;
            color: white;
            border: none;
            padding: 10px 15px;
            font-size: 14px;
            border-radius: 6px;
            cursor: pointer;
            transition: background 0.3s;
        }
        .calendar-header button:hover {
            background-color: #2980b9;
        }
        .calendar-header h2 {
            margin: 0;
            font-size: 22px;
            color: #34495e;
        }
        /* 行事曆網格 */
        .weekdays {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            background-color: #34495e;
            color: white;
            border-radius: 8px 8px 0 0;
        }
        .weekdays div {
            text-align: center;
            padding: 10px 0;
            font-weight: bold;
        }
        .days {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            border-left: 1px solid #e0e0e0;
            border-top: 1px solid #e0e0e0;
        }
        .day {
            min-height: 100px;
            border-right: 1px solid #e0e0e0;
            border-bottom: 1px solid #e0e0e0;
            padding: 8px;
            background-color: #fff;
            position: relative;
            transition: background 0.2s;
        }
        .day:hover {
            background-color: #f9f9f9;
        }
        .day.empty {
            background-color: #f4f4f4;
        }
        .date-num {
            font-size: 16px;
            font-weight: bold;
            color: #7f8c8d;
            margin-bottom: 5px;
        }
        /* 班別標籤 */
        .shift-label {
            background-color: #dff9fb;
            color: #0984e3;
            padding: 4px 6px;
            border-radius: 4px;
            font-size: 13px;
            font-weight: bold;
            text-align: center;
            border: 1px solid #74b9ff;
            margin-top: 4px;
        }
        .shift-label.afternoon {
            background-color: #fbebf9;
            color: #d63031;
            border: 1px solid #ff7675;
        }
        .footer {
            text-align: center;
            margin-top: 30px;
            font-size: 13px;
            color: #95a5a6;
        }
    </style>
</head>
<body>

<div class="calendar-container">
    <h1>李有炫 暑假工讀行事曆</h1>
    
    <div class="summary-box">
        <div class="summary-item total-hours">總排班時數：114 小時 (19天)</div>
        <div class="summary-item month-hours" id="monthly-hours-display">本月小計：計算中...</div>
    </div>

    <div class="calendar-header">
        <button id="prev-month">◀ 上個月</button>
        <h2 id="month-year">2026 年 6 月</h2>
        <button id="next-month">下個月 ▶</button>
    </div>

    <div class="weekdays">
        <div>週日</div>
        <div>週一</div>
        <div>週二</div>
        <div>週三</div>
        <div>週四</div>
        <div>週五</div>
        <div>週六</div>
    </div>
    
    <div class="days" id="calendar-days">
       
    </div>

    
</div>

<script>
    const scheduleData = {
        "2026-06-30": "08:30~15:30",
        "2026-07-07": "08:30~15:30",
        "2026-07-10": "08:30~15:30",
        "2026-07-17": "08:30~15:30",
        "2026-07-22": "08:30~15:30",
        "2026-07-29": "08:30~15:30",
        "2026-08-03": "08:30~15:30",
        "2026-08-04": "08:30~15:30",
        "2026-08-10": "08:30~15:30",
        "2026-08-11": "08:30~15:30",
        "2026-08-12": "08:30~15:30",
        "2026-08-13": "08:30~15:30",
        "2026-08-20": "08:30~15:30",
        "2026-08-21": "08:30~15:30",
        "2026-08-24": "08:30~15:30",
        "2026-08-25": "08:30~15:30",
        "2026-08-31": "08:30~15:30",
        "2026-09-01": "08:30~15:30",
        "2026-09-04": "08:30~15:30"
    };


    let currentDate = new Date(2026, 5, 1);

    function renderCalendar() {
        const year = currentDate.getFullYear();
        const month = currentDate.getMonth();

        const firstDayIndex = new Date(year, month, 1).getDay();
        const lastDay = new Date(year, month + 1, 0).getDate();

        
        document.getElementById("month-year").innerText = `${year} 年 ${month + 1} 月`;

        const calendarDays = document.getElementById("calendar-days");
        calendarDays.innerHTML = "";

        let shiftsInMonth = 0;

        for (let i = 0; i < firstDayIndex; i++) {
            calendarDays.innerHTML += `<div class="day empty"></div>`;
        }

        for (let i = 1; i <= lastDay; i++) {
            const mStr = String(month + 1).padStart(2, '0');
            const dStr = String(i).padStart(2, '0');
            const dateString = `${year}-${mStr}-${dStr}`;
            
            const shiftTime = scheduleData[dateString];
            
            let dayHTML = `<div class="date-num">${i}</div>`;
            
            if (shiftTime) {
                const labelClass = shiftTime === "10:00~17:00" ? "shift-label afternoon" : "shift-label";
                dayHTML += `<div class="${labelClass}">${shiftTime}</div>`;
                shiftsInMonth++;
            }

            calendarDays.innerHTML += `<div class="day">${dayHTML}</div>`;
        }

        const totalCells = firstDayIndex + lastDay;
        const remainingCells = 7 - (totalCells % 7);
        if (remainingCells < 7) {
            for (let i = 0; i < remainingCells; i++) {
                calendarDays.innerHTML += `<div class="day empty"></div>`;
            }
        }

        const monthlyHours = shiftsInMonth * 6;
        document.getElementById("monthly-hours-display").innerText = `${month + 1} 月小計：${monthlyHours} 小時`;
    }

    
    document.getElementById("prev-month").addEventListener("click", () => {
        currentDate.setMonth(currentDate.getMonth() - 1);
        renderCalendar();
    });

    document.getElementById("next-month").addEventListener("click", () => {
        currentDate.setMonth(currentDate.getMonth() + 1);
        renderCalendar();
    });

    renderCalendar();
</script>

</body>
</html>
